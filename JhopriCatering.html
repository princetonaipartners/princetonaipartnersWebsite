<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catering Order System</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Day.js for date manipulation -->
    <script src="https://unpkg.com/dayjs@1.11.9/dayjs.min.js"></script>

</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useCallback, useMemo } = React;

      // --- ⚙️ CONFIGURATION ---
      const AIRTABLE_CONFIG = {
        API_KEY: 'patl9nZ2QWVkj52BK.365f8e7a663af9965b7f296777066740f5cee50440990f0af8e66a9b8ffaee8a',
        BASE_ID: 'appMVpD8rLAkkv7dv',
      };
      const TABLE_NAMES = { MENU: 'Menu', CUSTOMERS: 'Customers', ORDERS: 'Orders' };
      // -------------------------

      const AIRTABLE_API_URL = `https://api.airtable.com/v0/${AIRTABLE_CONFIG.BASE_ID}`;

      const apiFetch = async (tableName, method = 'GET', body = null) => {
        const url = `${AIRTABLE_API_URL}/${tableName}`;
        const options = {
          method,
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${AIRTABLE_CONFIG.API_KEY}` },
        };
        if (body) { options.body = JSON.stringify(body); }
        const response = await fetch(url, options);
        if (!response.ok) {
          const errorData = await response.json();
          console.error('Airtable API Error:', errorData);
          throw new Error(`Airtable API error for table ${tableName}: ${errorData.error?.message || response.statusText}`);
        }
        return response.json();
      };

      // --- ICONS ---
      const PlusIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>);
      const TrashIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm4 0a1 1 0 012 0v6a1 1 0 11-2 0V8z" clipRule="evenodd" /></svg>);
      const AlertIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>);
      const HomeIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>);
      const DetailsIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>);

      // --- REUSABLE UI COMPONENTS ---
      const LoadingSpinner = () => (<div className="flex justify-center items-center h-screen"><div className="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-500"></div></div>);
      const Modal = ({ title, message, onClose, children }) => {
        if (!message && !children) return null;
        return (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-4">
                <div className="bg-white rounded-lg shadow-xl p-6 w-full max-w-md m-4">
                    <div className="flex items-center mb-4"><h3 className="text-lg font-medium text-gray-900">{title || 'Details'}</h3></div>
                    {message && <div className="flex items-center"><AlertIcon /><p className="ml-3 text-sm text-gray-600 mb-4">{message}</p></div>}
                    {children}
                    <div className="flex justify-end mt-6"><Button onClick={onClose} variant="primary">Close</Button></div>
                </div>
            </div>
        );
      };

      const Button = ({ onClick, children, variant = 'primary', type = 'button', className = '' }) => {
        const baseClasses = "px-4 py-2 rounded-lg font-semibold shadow-sm transition-transform transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-offset-2 flex items-center justify-center gap-2";
        const variants = { primary: "bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500", secondary: "bg-gray-200 text-gray-800 hover:bg-gray-300 focus:ring-gray-400", tertiary: "text-blue-600 hover:text-blue-900" };
        return (<button type={type} onClick={onClick} className={`${baseClasses} ${variants[variant]} ${className}`}>{children}</button>);
      };
      
      const Header = ({ onNavigate }) => {
        const [time, setTime] = useState(new Date());
        useEffect(() => {
            const timer = setInterval(() => setTime(new Date()), 1000);
            return () => clearInterval(timer);
        }, []);

        return (
            <header className="bg-white shadow-md sticky top-0 z-40">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between items-center py-4">
                        <button onClick={() => onNavigate('dashboard')} className="flex items-center gap-2 text-xl font-bold text-gray-800 hover:text-blue-600 transition">
                            <HomeIcon />
                            <span>Jhopri Catering OS</span>
                        </button>
                        <div className="text-right text-xs text-gray-500">
                            <div>{time.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
                            <div>{time.toLocaleTimeString()}</div>
                        </div>
                    </div>
                </div>
            </header>
        );
      };

      // --- DASHBOARD-SPECIFIC COMPONENTS ---
      const StatCard = ({ title, value, note }) => (
        <div className="bg-white p-6 rounded-xl shadow-lg">
            <p className="text-sm font-medium text-gray-500">{title}</p>
            <p className="text-2xl font-bold text-gray-800">{value}</p>
            <p className="text-xs text-gray-400">{note}</p>
        </div>
      );

      const DashboardMetrics = ({ orders }) => {
        const metrics = useMemo(() => {
            const confirmedOrders = orders.filter(o => o.fields.Status === 'Confirmed');
            const now = dayjs();

            const upcomingEvents = confirmedOrders.filter(o => dayjs(o.fields.Event_Date).isAfter(now)).length;
            const monthlyRevenue = confirmedOrders
                .filter(o => dayjs(o.fields.Event_Date).isSame(now, 'month'))
                .reduce((sum, o) => sum + (o.fields.Final_Quote || 0), 0);
            const activeOrdersCount = orders.filter(o => o.fields.Status === 'Quoted' || o.fields.Status === 'Confirmed').length;

            return { upcomingEvents, monthlyRevenue, activeOrdersCount };
        }, [orders]);

        return (
            <div className="mb-6">
                <h2 className="text-xl font-semibold text-gray-700 mb-4">At a Glance</h2>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    <StatCard 
                        title="Upcoming Events" 
                        value={metrics.upcomingEvents}
                        note="Confirmed future events"
                    />
                    <StatCard 
                        title="Active Orders" 
                        value={metrics.activeOrdersCount}
                        note="Status is Quoted or Confirmed"
                    />
                    <StatCard 
                        title="This Month's Revenue" 
                        value={`$${metrics.monthlyRevenue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`}
                        note={`From confirmed orders in ${dayjs().format('MMMM')}`}
                    />
                </div>
            </div>
        );
      };

      // --- PAGE COMPONENTS ---
      const DashboardPage = ({ orders, customers, onNavigate, onRefresh, onSelectOrder }) => {
        const [filters, setFilters] = useState({ searchTerm: '', status: 'All' });

        const getCustomerName = useCallback((customerId) => {
          if (!customerId || !customers.length) return 'N/A';
          const customer = customers.find(c => c.id === customerId[0]);
          return customer?.fields.Name || 'Unknown Customer';
        }, [customers]);

        const filteredOrders = useMemo(() => {
            return orders.filter(order => {
                const customerNameMatch = filters.searchTerm === '' || getCustomerName(order.fields.Customer).toLowerCase().includes(filters.searchTerm.toLowerCase());
                const statusMatch = filters.status === 'All' || order.fields.Status === filters.status;
                return customerNameMatch && statusMatch;
            });
        }, [orders, filters, getCustomerName]);
        
        const handleFilterChange = (e) => {
            const { name, value } = e.target;
            setFilters(prev => ({ ...prev, [name]: value }));
        };

        return (
          <div className="p-4 sm:p-6 lg:p-8">
            <DashboardMetrics orders={orders} />

            <div className="bg-white p-4 sm:p-6 rounded-xl shadow-lg mb-6">
                <div className="flex flex-col md:flex-row gap-4">
                    <input 
                        type="text"
                        name="searchTerm"
                        placeholder="Search by customer name..."
                        value={filters.searchTerm}
                        onChange={handleFilterChange}
                        className="flex-grow p-2 border rounded-md focus:ring-2 focus:ring-blue-500"
                    />
                    <select 
                        name="status"
                        value={filters.status}
                        onChange={handleFilterChange}
                        className="p-2 border rounded-md focus:ring-2 focus:ring-blue-500"
                    >
                        <option value="All">All Statuses</option>
                        <option>Quoted</option>
                        <option>Confirmed</option>
                        <option>Completed</option>
                        <option>Cancelled</option>
                    </select>
                </div>
            </div>

            <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
              <h1 className="text-2xl sm:text-3xl font-bold text-gray-800">All Orders</h1>
              <div className="flex space-x-2 w-full sm:w-auto">
                <Button onClick={onRefresh} variant="secondary" className="w-1/2 sm:w-auto">Refresh</Button>
                <Button onClick={() => onNavigate('newOrder')} className="w-1/2 sm:w-auto"><PlusIcon /> New Order</Button>
              </div>
            </header>
            <main className="bg-white p-4 sm:p-6 rounded-xl shadow-lg">
              <div className="overflow-x-auto">
                {filteredOrders.length > 0 ? (
                  <table className="min-w-full divide-y divide-gray-200">
                    <thead className="bg-gray-50">
                      <tr>
                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Customer</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Event Date</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Quote Date</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Final Quote</th>
                        <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                      </tr>
                    </thead>
                    <tbody className="bg-white divide-y divide-gray-200">
                      {filteredOrders.map(order => (
                        <tr key={order.id} className="hover:bg-gray-50">
                          <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{getCustomerName(order.fields.Customer)}</td>
                          <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{order.fields.Event_Date}</td>
                          <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{dayjs(order.createdTime).format('YYYY-MM-DD')}</td>
                          <td className="px-6 py-4 whitespace-nowrap"><span className={`px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${order.fields.Status === 'Confirmed' ? 'bg-green-100 text-green-800' : order.fields.Status === 'Completed' ? 'bg-blue-100 text-blue-800' : order.fields.Status === 'Cancelled' ? 'bg-red-100 text-red-800' : 'bg-yellow-100 text-yellow-800'}`}>{order.fields.Status || 'Quoted'}</span></td>
                          <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${order.fields.Final_Quote?.toFixed(2) || '0.00'}</td>
                          <td className="px-6 py-4 whitespace-nowrap text-right text-sm font-medium flex justify-end items-center gap-2">
                            <button onClick={() => onSelectOrder(order)} className="p-2 text-gray-500 hover:text-blue-600 rounded-full hover:bg-gray-100 transition"><DetailsIcon /></button>
                            <a href="#" onClick={(e) => { e.preventDefault(); onNavigate('editOrder', order); }} className="text-blue-600 hover:text-blue-900">Edit</a>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                ) : (<div className="text-center py-12"><h3 className="text-lg font-medium text-gray-900">No matching orders found</h3><p className="mt-1 text-sm text-gray-500">Try adjusting your filters or search term.</p></div>)}
              </div>
            </main>
          </div>
        );
      };

      const OrderFormPage = ({ menu, customers, existingOrder, onSave, onCancel, setModalMessage }) => {
        const [order, setOrder] = useState({ Customer: existingOrder?.fields.Customer || [], Event_Date: existingOrder?.fields.Event_Date || '', Order_Items: existingOrder?.fields.Order_Items ? JSON.parse(existingOrder.fields.Order_Items) : [], Final_Quote: existingOrder?.fields.Final_Quote || 0, Status: existingOrder?.fields.Status || 'Quoted', Payment_Status: existingOrder?.fields.Payment_Status || 'Unpaid', Amount_Paid: existingOrder?.fields.Amount_Paid || 0, Notes: existingOrder?.fields.Notes || '' });
        const [newCustomer, setNewCustomer] = useState({ name: '', phone: '', email: '' });
        const [isCreatingCustomer, setIsCreatingCustomer] = useState(false);
        const suggestedQuote = useCallback(() => order.Order_Items.reduce((total, item) => {
          const menuItem = menu.find(m => m.id === item.id);
          if (!menuItem) return total;
          const priceField = { 'Small': 'Price_Small', 'Large Shallow': 'Price_Large_Shallow', 'Large Deep': 'Price_Large_Deep' }[item.size];
          return total + ((menuItem.fields[priceField] || 0) * item.quantity);
        }, 0), [order.Order_Items, menu]);

        useEffect(() => { if (!existingOrder) { setOrder(prev => ({ ...prev, Final_Quote: suggestedQuote() })); } }, [order.Order_Items, existingOrder, suggestedQuote]);

        const handleInputChange = (e) => { const { name, value } = e.target; setOrder(prev => ({ ...prev, [name]: value })); };
        const handleItemChange = (index, field, value) => { const newItems = [...order.Order_Items]; newItems[index][field] = value; setOrder(prev => ({ ...prev, Order_Items: newItems })); };
        const addItem = () => setOrder(prev => ({ ...prev, Order_Items: [...prev.Order_Items, { id: '', size: 'Small', quantity: 1 }] }));
        const removeItem = (index) => setOrder(prev => ({ ...prev, Order_Items: order.Order_Items.filter((_, i) => i !== index) }));
        const handleSubmit = async (e) => {
          e.preventDefault();
          let customerId = order.Customer;
          if (isCreatingCustomer && newCustomer.name) {
            try {
              const newCustomerRecord = await apiFetch(TABLE_NAMES.CUSTOMERS, 'POST', { fields: { Name: newCustomer.name, Phone: newCustomer.phone, Email: newCustomer.email } });
              customerId = [newCustomerRecord.id];
            } catch (error) { setModalMessage(`Error creating customer: ${error.message}. Please check your Airtable field names.`); return; }
          }
          const orderData = { ...order, Customer: customerId, Order_Items: JSON.stringify(order.Order_Items), Suggested_Quote: suggestedQuote(), Final_Quote: Number(order.Final_Quote), Amount_Paid: Number(order.Amount_Paid) };
          onSave(orderData, existingOrder?.id);
        };
        
        return (
            <div className="p-4 sm:p-6 lg:p-8">
                <header className="flex justify-between items-center mb-6">
                    <h1 className="text-2xl sm:text-3xl font-bold text-gray-800">{existingOrder ? `Edit Order #${existingOrder?.fields?.OrderID || ''}` : 'Create New Order'}</h1>
                    <Button onClick={onCancel} variant="secondary">Cancel</Button>
                </header>
                <main className="bg-white p-4 sm:p-6 rounded-xl shadow-lg">
                    <form onSubmit={handleSubmit} className="space-y-6">
                        {/* Customer Section */}
                        <div className="p-4 border rounded-lg"><h3 className="font-semibold mb-2 text-lg">Customer</h3>
                            {!isCreatingCustomer ? (<div className="flex items-center gap-4"><select name="Customer" value={order.Customer[0] || ''} onChange={(e) => setOrder(prev => ({ ...prev, Customer: [e.target.value] }))} className="flex-grow p-2 border rounded-md"><option value="">Select Existing Customer</option>{customers.map(c => <option key={c.id} value={c.id}>{c.fields.Name}</option>)}</select><Button onClick={() => setIsCreatingCustomer(true)}>Add New</Button></div>
                            ) : (<div className="space-y-2 bg-gray-50 p-3 rounded-md"><input type="text" placeholder="New Customer Name" value={newCustomer.name} onChange={(e) => setNewCustomer({...newCustomer, name: e.target.value})} className="w-full p-2 border rounded-md" required/><input type="tel" placeholder="Phone" value={newCustomer.phone} onChange={(e) => setNewCustomer({...newCustomer, phone: e.target.value})} className="w-full p-2 border rounded-md" /><input type="email" placeholder="Email" value={newCustomer.email} onChange={(e) => setNewCustomer({...newCustomer, email: e.target.value})} className="w-full p-2 border rounded-md" /><Button onClick={() => setIsCreatingCustomer(false)} variant="secondary">Use Existing</Button></div>)}
                        </div>
                        {/* Order Items Section */}
                        <div className="p-4 border rounded-lg"><h3 className="font-semibold mb-2 text-lg">Order Items</h3>{order.Order_Items.map((item, index) => (<div key={index} className="grid grid-cols-1 md:grid-cols-12 gap-2 mb-2 p-2 bg-gray-50 rounded-md items-center"><select value={item.id} onChange={(e) => handleItemChange(index, 'id', e.target.value)} className="md:col-span-5 p-2 border rounded-md"><option value="">Select Menu Item</option>{menu.map(m => <option key={m.id} value={m.id}>{m.fields.Name}</option>)}</select><select value={item.size} onChange={(e) => handleItemChange(index, 'size', e.target.value)} className="md:col-span-3 p-2 border rounded-md"><option>Small</option><option>Large Shallow</option><option>Large Deep</option></select><input type="number" min="1" value={item.quantity} onChange={(e) => handleItemChange(index, 'quantity', parseInt(e.target.value) || 1)} className="md:col-span-2 p-2 border rounded-md" /><button type="button" onClick={() => removeItem(index)} className="md:col-span-2 text-red-500 hover:text-red-700 flex justify-center items-center"><TrashIcon/></button></div>))}<Button onClick={addItem}>Add Item</Button></div>
                        {/* Details & Pricing */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="p-4 border rounded-lg space-y-4"><h3 className="font-semibold text-lg">Details</h3><div><label className="block text-sm font-medium text-gray-700">Event Date</label><input type="date" name="Event_Date" value={order.Event_Date} onChange={handleInputChange} className="mt-1 block w-full p-2 border rounded-md" /></div><div><label className="block text-sm font-medium text-gray-700">Notes</label><textarea name="Notes" value={order.Notes} onChange={handleInputChange} rows="3" className="mt-1 block w-full p-2 border rounded-md"></textarea></div></div>
                            <div className="p-4 border rounded-lg space-y-4 bg-blue-50"><h3 className="font-semibold text-lg">Pricing & Status</h3><div className="text-xl">Suggested: <span className="font-bold text-blue-700">${suggestedQuote().toFixed(2)}</span></div><div><label className="block text-sm font-medium text-gray-700">Final Quote ($)</label><input type="number" step="0.01" name="Final_Quote" value={order.Final_Quote} onChange={handleInputChange} className="mt-1 block w-full p-2 border rounded-md" /></div><div><label className="block text-sm font-medium text-gray-700">Amount Paid ($)</label><input type="number" step="0.01" name="Amount_Paid" value={order.Amount_Paid} onChange={handleInputChange} className="mt-1 block w-full p-2 border rounded-md" /></div><div className="grid grid-cols-2 gap-4"><div><label className="block text-sm font-medium text-gray-700">Order Status</label><select name="Status" value={order.Status} onChange={handleInputChange} className="mt-1 block w-full p-2 border rounded-md"><option>Quoted</option><option>Confirmed</option><option>Completed</option><option>Cancelled</option></select></div><div><label className="block text-sm font-medium text-gray-700">Payment Status</label><select name="Payment_Status" value={order.Payment_Status} onChange={handleInputChange} className="mt-1 block w-full p-2 border rounded-md"><option>Unpaid</option><option>Deposit Paid</option><option>Paid in Full</option></select></div></div></div>
                        </div>
                        <div className="flex justify-end pt-4"><Button type="submit">Save Order</Button></div>
                    </form>
                </main>
            </div>
        );
      };

      const OrderDetailsModal = ({ order, customer, menu, onClose }) => {
          if (!order) return null;
          const orderItems = order.fields.Order_Items ? JSON.parse(order.fields.Order_Items) : [];
          const finalQuote = order.fields.Final_Quote || 0;
          const amountPaid = order.fields.Amount_Paid || 0;
          const amountDue = finalQuote - amountPaid;
          const getItemName = (itemId) => menu.find(m => m.id === itemId)?.fields?.Name || 'Unknown Item';
          return (
              <Modal title={`Order Details #${order.fields.OrderID || ''}`} onClose={onClose}>
                  <div className="space-y-4 text-sm">
                      <div className="p-3 bg-gray-50 rounded-lg"><h4 className="font-semibold text-gray-800 mb-2">Customer Information</h4><p><strong>Name:</strong> {customer?.fields?.Name || 'N/A'}</p><p><strong>Phone:</strong> {customer?.fields?.Phone || 'N/A'}</p><p><strong>Email:</strong> {customer?.fields?.Email || 'N/A'}</p></div>
                      <div className="p-3 bg-gray-50 rounded-lg"><h4 className="font-semibold text-gray-800 mb-2">Order Items</h4><ul className="list-disc list-inside space-y-1">{orderItems.map((item, index) => (<li key={index}>{item.quantity} x {item.size} - <strong>{getItemName(item.id)}</strong></li>))}</ul></div>
                      <div className="p-3 bg-blue-50 rounded-lg"><h4 className="font-semibold text-gray-800 mb-2">Financial Summary</h4><div className="grid grid-cols-2 gap-x-4"><p><strong>Final Quote:</strong></p><p className="text-right">${finalQuote.toFixed(2)}</p><p><strong>Amount Paid:</strong></p><p className="text-right">${amountPaid.toFixed(2)}</p><hr className="col-span-2 my-1"/><p className="font-bold">Amount Due:</p><p className="text-right font-bold">${amountDue.toFixed(2)}</p></div></div>
                      {order.fields.Notes && (<div className="p-3 bg-gray-50 rounded-lg"><h4 className="font-semibold text-gray-800 mb-2">Notes</h4><p className="whitespace-pre-wrap">{order.fields.Notes}</p></div>)}
                  </div>
              </Modal>
          );
      };

      // --- MAIN APP ---
      function App() {
        const [page, setPage] = useState('dashboard');
        const [editingOrder, setEditingOrder] = useState(null);
        const [viewingOrder, setViewingOrder] = useState(null);
        const [orders, setOrders] = useState([]);
        const [customers, setCustomers] = useState([]);
        const [menu, setMenu] = useState([]);
        const [isLoading, setIsLoading] = useState(true);
        const [error, setError] = useState(null);
        const [modalMessage, setModalMessage] = useState('');

        const fetchData = useCallback(async () => {
          setIsLoading(true); setError(null);
          try {
            const [ordersRes, customersRes, menuRes] = await Promise.all([
              apiFetch(`${TABLE_NAMES.ORDERS}?sort%5B0%5D%5Bfield%5D=Event_Date&sort%5B0%5D%5Bdirection%5D=desc`),
              apiFetch(`${TABLE_NAMES.CUSTOMERS}?sort%5B0%5D%5Bfield%5D=Name&sort%5B0%5D%5Bdirection%5D=asc`),
              apiFetch(`${TABLE_NAMES.MENU}?sort%5B0%5D%5Bfield%5D=Name&sort%5B0%5D%5Bdirection%5D=asc`)
            ]);
            setOrders(ordersRes.records || []); setCustomers(customersRes.records || []); setMenu(menuRes.records || []);
          } catch (err) { setError(err.message); } finally { setIsLoading(false); }
        }, []);

        useEffect(() => { fetchData(); }, [fetchData]);

        const handleNavigate = (targetPage, order = null) => { setEditingOrder(order); setPage(targetPage); };
        const handleSaveOrder = async (orderData, orderId) => {
          setIsLoading(true);
          const method = orderId ? 'PATCH' : 'POST';
          const payload = orderId ? { records: [{ id: orderId, fields: orderData }] } : { records: [{ fields: orderData }] };
          try {
            await apiFetch(TABLE_NAMES.ORDERS, method, payload);
            await fetchData(); setPage('dashboard');
          } catch (err) { setModalMessage(`Error saving order: ${err.message}`); setIsLoading(false); }
        };

        const renderPage = () => {
          if (isLoading && !orders.length) return <LoadingSpinner />;
          if (error) return <div className="p-8 text-center text-red-600 bg-red-100 rounded-lg m-4">Error: {error}</div>;
          switch (page) {
            case 'newOrder': return <OrderFormPage menu={menu} customers={customers} onSave={handleSaveOrder} onCancel={() => setPage('dashboard')} setModalMessage={setModalMessage} />;
            case 'editOrder': return <OrderFormPage menu={menu} customers={customers} existingOrder={editingOrder} onSave={handleSaveOrder} onCancel={() => setPage('dashboard')} setModalMessage={setModalMessage} />;
            default: return <DashboardPage orders={orders} customers={customers} onNavigate={handleNavigate} onRefresh={fetchData} onSelectOrder={setViewingOrder} />;
          }
        };
        
        const selectedCustomer = viewingOrder ? customers.find(c => c.id === viewingOrder.fields.Customer?.[0]) : null;

        return (
          <div className="font-sans">
            <Modal title="Error" message={modalMessage} onClose={() => setModalMessage('')} />
            <OrderDetailsModal order={viewingOrder} customer={selectedCustomer} menu={menu} onClose={() => setViewingOrder(null)} />
            <Header onNavigate={handleNavigate} />
            <div className="max-w-7xl mx-auto">
                {isLoading && orders.length > 0 && (<div className="fixed top-20 right-4 bg-blue-500 text-white text-sm py-1 px-3 rounded-full shadow-lg z-50 animate-pulse">Syncing...</div>)}
                {renderPage()}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
